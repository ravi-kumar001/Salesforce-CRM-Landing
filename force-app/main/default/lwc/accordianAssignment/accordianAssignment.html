<template>
    <lightning-card title="Account Contacts">
        <template if:true={accountToConMap}>
            <lightning-accordion allow-multiple-sections-open>
                <template for:each={accountToConMap} for:item="acc">
                    <lightning-accordion-section key={acc.Id} name={acc.Id} label={acc.Name}>
                        <template if:true={acc.Contacts}>
                            <lightning-datatable key-field="Id" data={acc.Contacts} columns={columns}
                                onrowaction={handleRowAction}>
                            </lightning-datatable>
                        </template>
                        <template if:false={acc.Contacts}>
                            <div class="slds-grid">
                                <div class="slds-col slds-align_absolute-center">
                                    <p>No Contacts Found</p>
                                </div>
                                <div class="slds-col slds-align_absolute-center">
                                    <lightning-button label="Add Contact"
                                        onclick={openAddContactModalHandler}></lightning-button>
                                </div>
                            </div>
                        </template>
                    </lightning-accordion-section>
                </template>
            </lightning-accordion>
        </template>
        <template if:true={showEditForm}>
            <section role="dialog" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Edit Contact</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-record-edit-form record-id={selectedContactId} object-api-name="Contact"
                            onsuccess={handleSuccess}>

                            <lightning-input-field field-name="Name"></lightning-input-field>
                            <lightning-input-field field-name="Email"></lightning-input-field>
                            <lightning-input-field field-name="Phone"></lightning-input-field>

                            <lightning-button type="submit" label="Save" variant="brand"></lightning-button>
                            <lightning-button label="Cancel" onclick={closeModal}></lightning-button>

                        </lightning-record-edit-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <template if:true={openAddContactModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">New Contact</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-record-edit-form object-api-name="Contact" onsuccess={handleNewContactSuccess}
                            oncancel={handleNewContactCancel}>
                            <lightning-messages></lightning-messages>

                            <lightning-input-field field-name="FirstName"></lightning-input-field>
                            <lightning-input-field field-name="LastName" required></lightning-input-field>
                            <lightning-input-field field-name="Email"></lightning-input-field>
                            <lightning-input-field field-name="Phone"></lightning-input-field>
                            <lightning-input-field field-name="AccountId"></lightning-input-field>

                            <div class="slds-m-top_medium">
                                <lightning-button type="submit" variant="brand" label="Save">
                                </lightning-button>

                                <lightning-button variant="neutral" label="Cancel" class="slds-m-left_small"
                                    onclick={handleNewContactCancel}>
                                </lightning-button>
                            </div>
                        </lightning-record-edit-form>

                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
