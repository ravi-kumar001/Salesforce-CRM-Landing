<template>
    <lightning-file-upload label="Attach receipt" name="fileUploader" accept={acceptedFormats} record-id={recordId}
        onuploadfinished={handleUploadFinished} multiple>
    </lightning-file-upload>

    <lightning-card title="Image Preview" icon-name="custom:custom19">
        <template if:true={card}>
            <img src={myImageUrl} style="max-width:300px" />
        </template>
    </lightning-card>
</template>
