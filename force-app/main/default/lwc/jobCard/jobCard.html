<template>
    <lightning-card>

        <div class="mobile-header">
            <span class="back-btn">←</span>
            <span class="header-title">New Job Card</span>
        </div>
        <div class="container">

            <div class="header">
                <div class="nav-tabs">
                    <div class="tab-item inactive">
                        Job Card List View
                    </div>

                    <div class="tab-item active">
                        New Job Card
                    </div>
                </div>
            </div>

            <div class="progress-wrapper">

                <lightning-progress-indicator current-step={step} type="base" class="custom-progress">

                    <lightning-progress-step value="1"></lightning-progress-step>
                    <lightning-progress-step value="2"></lightning-progress-step>
                    <lightning-progress-step value="3"></lightning-progress-step>

                </lightning-progress-indicator>
                <div class="progress-labels">

                    <div class="step-label">Identify Product</div>

                    <div class="step-label">
                        Product & Customer Details
                    </div>

                    <div class="step-label">Service Details</div>

                </div>

            </div>

            <template if:true={isStepOne}>

                <div class="identify-card">

                    <h2 class="section-title">
                        Identify Product
                    </h2>

                    <div class="slds-grid slds-wrap slds-gutters_large form-section1">

                        <div class="slds-col slds-size_1-of-3">

                            <div class="slds-form-element search-container">

                                <label class="slds-form-element__label">
                                    <span class="slds-required">*</span>
                                    Tractor / Implement Chassis No.
                                </label>

                                <div class="slds-form-element__control">

                                    <lightning-input type="search" variant="label-hidden"
                                        placeholder="Search Chassis Number" value={chassisNo}
                                        onchange={handleChassisChange}>
                                    </lightning-input>

                                </div>

                                <template if:true={hasProducts}>

                                    <div class="search-card has-result">

                                        <template for:each={products} for:item="prod">

                                            <div key={prod.Id} class="search-item" data-id={prod.Id}
                                                onclick={handleSelectProduct}>

                                                <div class="prod-name">
                                                    {prod.PricebookEntry.Product2.Name}
                                                </div>

                                                <div class="prod-code">
                                                    {prod.PricebookEntry.Product2.ProductCode}
                                                </div>

                                            </div>

                                        </template>

                                    </div>

                                </template>

                            </div>

                        </div>

                        <div class="slds-col slds-size_1-of-3">

                            <label class="slds-form-element__label">
                                Hour Meter Working
                            </label>

                            <div class="radio-group">

                                <lightning-input type="radio" label="YES" name="hourMeter" value="YES" checked={isYes}
                                    onchange={handleHourMeter}>
                                </lightning-input>

                                <lightning-input type="radio" label="NO" name="hourMeter" value="NO" checked={isNo}
                                    onchange={handleHourMeter}>
                                </lightning-input>

                            </div>

                        </div>

                        <div class="slds-col slds-size_1-of-3">

                            <div class="slds-form-element">
                                <label class="slds-form-element__label">
                                    <abbr class="slds-required">*</abbr>
                                    Tractor Running Hours
                                </label>

                                <div class="slds-form-element__control">
                                    <lightning-input type="number" variant="label-hidden" value={runningHours}
                                        onchange={handleRunningHourChange}>
                                    </lightning-input>
                                </div>
                            </div>
                        </div>

                        <div class="slds-col slds-size_1-of-1 mobile-upload">

                            <label class="slds-form-element__label">
                                <abbr class="slds-required">*</abbr>
                                Hour Meter Image
                            </label>

                            <div class="upload-box" onclick={openHourMeterUpload}>

                                <template if:true={hourMeterPreview}>
                                    <img src={hourMeterPreview} class="preview-image" />
                                </template>

                                <template if:false={hourMeterPreview}>
                                    <lightning-icon icon-name="utility:photo" size="medium"></lightning-icon>
                                    <div class="upload-text">Capture/Upload Image</div>
                                </template>

                                <input type="file" accept="image/*" class="file-input" onchange={handleHourMeterFile} />

                            </div>

                        </div>

                        <div class="slds-col slds-size_1-of-1 mobile-upload">

                            <label class="slds-form-element__label">
                                <abbr class="slds-required">*</abbr>
                                Chasis Image
                            </label>

                            <div class="upload-box" onclick={openChassisUpload}>

                                <template if:true={chassisPreview}>
                                    <img src={chassisPreview} class="preview-image" />
                                </template>

                                <template if:false={chassisPreview}>
                                    <lightning-icon icon-name="utility:photo" size="medium"></lightning-icon>
                                    <div class="upload-text">Capture/Upload Image</div>
                                </template>

                                <input type="file" accept="image/*" class="file-input" onchange={handleChassisFile} />

                            </div>

                        </div>

                    </div>
                </div>
            </template>

            <template if:true={isStepTwo}>

                <div class="step-card">
                    <div class="tractor-header" onclick={toggleAccordion}>

                        <div class="header-left">

                            <lightning-icon icon-name={accordionIcon} size="x-small" class="accordion-icon">
                            </lightning-icon>

                            <span class="tractor-title">
                                Tractor Details
                            </span>

                            <span class="status-badge">
                                Product Status: PDI
                            </span>

                        </div>

                    </div>

                    <div class="header-divider"></div>
                    <template if:true={isAccordionOpen}>

                        <div class="slds-grid slds-wrap slds-gutters_large form-section">

                            <div class="slds-col slds-size_1-of-4">
                                <lightning-input label="Tractor Chassis No." value={chassisNo} disabled>
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-4">
                                <lightning-input label="Tractor Model" value={tractorModel} disabled>
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-4 awdd-date">
                                <lightning-input label="AWDD Date" value={awddDate} disabled>
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-4">
                                <lightning-input label="Tractor Running Hours" value={runningHours} disabled>
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-4">
                                <lightning-combobox label="Fuel Indication" options={fuelOptions}>
                                </lightning-combobox>
                            </div>

                            <div class="slds-col slds-size_1-of-4 operation-failure">
                                <lightning-combobox label="Operation At Failure" options={failureOptions}>
                                </lightning-combobox>
                            </div>

                        </div>

                        <div class="tyre-section">

                            <div class="tyre-title">
                                Tyre Pressure (PSI)
                            </div>

                            <div class="slds-grid slds-wrap slds-gutters_large form-section">

                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input label="Front Left" placeholder="PSI"></lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input label="Front Right" placeholder="PSI"></lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input label="Rear Left" placeholder="PSI"></lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input label="Rear Right" placeholder="PSI"></lightning-input>
                                </div>

                            </div>

                        </div>

                    </template>

                </div>

            </template>

            <template if:true={isStepThree}>


                <div class="identify-card service-mobile">

                    <div class="service-history-card">

                        <div class="view-history-banner" id="vhBanner">
                            <div class="vhb-left">
                                <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <div>
                                    <div class="vhb-title">View Service History</div>
                                    <div class="vhb-sub">Past service records</div>
                                </div>
                            </div>
                            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="2.5" style="color:var(--gray-400)">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                            </svg>
                        </div>

                    </div>

                    <h2 class="section-title">
                        Service Details
                    </h2>

                    <div class="divider"></div>

                    <div class="mobile-field">
                        <lightning-input label="Product Status" value="PDI" disabled>
                        </lightning-input>
                        <div class="sub-text">Sixth Service</div>
                    </div>

                    <lightning-combobox label="Job Card Type / Service Type" options={jobCardType}>
                    </lightning-combobox>

                    <lightning-combobox label="Job Card Location" options={jobCardLocation}>
                    </lightning-combobox>


                    <div class="textarea-wrapper">

                        <lightning-input type="text" class="text" label="Customer Verbatim"
                            placeholder="Enter complaint">
                        </lightning-input>

                        <lightning-icon icon-name="utility:mic" size="small" class="mic-icon">
                        </lightning-icon>
                    </div>

                    <div>
                        <lightning-textarea label="Additional Repair Recommended" placeholder="Enter complaint">
                        </lightning-textarea>
                    </div>
                </div>

                <div class="identify-card step3-desktop">

                    <h2 class="section-title">
                        Service Details
                        <span class="service-link">View Service History</span>
                    </h2>

                    <div class="form-grid">

                        <lightning-input label="Product Status" value="PDI" disabled>
                        </lightning-input>

                        <lightning-input label="Job Card Type / Service Type" value="Product Quality" disabled>
                        </lightning-input>

                        <lightning-input label="Job Card Location" value="Workshop" disabled>
                        </lightning-input>

                    </div>


                    <div class="support-text">
                        ⚡ Supporting Text
                    </div>

                    <div class="support-message">
                        The following checkpoint(s) were marked as "Not OK" during the PDI process.
                        <span class="service-link">View PDI Report</span>
                    </div>


                    <lightning-datatable key-field="id" data={serviceCheckpoints} columns={columns}>
                    </lightning-datatable>


                    <div class="repair-section">

                        <lightning-textarea label="Additional Repair Recommended" value={additionalRepair}
                            onchange={handleRepairChange} placeholder="Enter recommended repairs or services">
                        </lightning-textarea>

                    </div>

                    <div class="form-grid">

                        <lightning-input label="Service Estimate Amount" type="number" value={estimatedAmount}
                            onchange={handleEstimateAmount} placeholder="Enter estimated amount">
                        </lightning-input>

                        <lightning-input label="Service Estimated Delivery Date & Time" type="datetime"
                            value={deliveryDateTime} onchange={handleDeliveryDate}>
                        </lightning-input>

                    </div>

                </div>

            </template>

            <div class="footer">
                <lightning-button label="Back" variant="neutral" onclick={handleBack}>
                </lightning-button>

                <lightning-button label={buttonLabel} variant="brand" onclick={handleNext} class="custom-red-button">
                </lightning-button>
            </div>

        </div>

    </lightning-card>
</template>
